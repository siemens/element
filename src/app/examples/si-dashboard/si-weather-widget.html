<div class="row align-items-start">
  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="vertical"
    heading="Zug, Switzerland"
    [value]="verticalData"
  />

  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="vertical"
    heading="Zug, Switzerland"
    [current]="current"
    [forecast]="forecast"
  />

  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="horizontal"
    heading="Zug, Switzerland"
    [current]="current"
  />

  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="horizontal"
    heading="Zug, Switzerland"
    [value]="verticalData"
  />

  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="horizontal"
    heading="Zug, Switzerland"
    [current]="current"
    [forecast]="forecast"
  />

  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="vertical"
    heading="Zug, Switzerland"
    [current]="current"
  />

  <!-- Horizontal: without forecast -->
  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="horizontal"
    heading="Berlin, Germany"
    [current]="verticalData.current"
    [metrics]="metrics"
  />

  <!-- Vertical: night variant -->
  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="vertical"
    heading="Reykjavík, Iceland"
    [value]="nightData"
  />

  <!-- Vertical: minimal (no metrics, no forecast) -->
  <si-weather-widget
    class="col-lg-4 col-md-6 mb-6"
    layout="vertical"
    heading="Munich, Germany"
    [value]="verticalDataMinimal"
  />

  <!-- Compact: with location -->
  <si-weather-widget
    class="col-lg-4 col-md-4 col-sm-6 mb-6"
    layout="compact"
    location="Zug"
    [value]="compactData"
  />

  <!-- Compact: temperature only -->
  <si-weather-widget
    class="col-lg-4 col-md-4 col-sm-6 mb-6"
    layout="compact"
    location="Munich"
    [current]="{ temperature: '14°', illustration: { condition: 'mostly-cloudy' } }"
  />

  <!-- Loading state -->
  <si-weather-widget
    class="col-lg-4 col-md-4 col-sm-6 mb-6"
    layout="vertical"
    heading="Munich, Germany"
    showLoadingIndicator
  />

  <!-- With image on the start (left) side -->
  <si-weather-widget
    class="col-lg-12 col-md-12 mb-6"
    layout="horizontal"
    heading="Palekastro, Crete"
    imgSrc="assets/images/beach.jpg"
    imgAlt="Beach"
    imgDir="horizontal"
    imgObjectFit="cover"
    [value]="horizontalData"
  />
</div>
