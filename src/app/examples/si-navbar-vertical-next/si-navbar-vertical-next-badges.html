<div class="has-navbar-fixed-top">
  <si-application-header>
    <si-header-brand>
      <a routerLink="/" siHeaderLogo></a>
      <h1 class="application-name">Navbar Vertical Next Badges Example</h1>
    </si-header-brand>
  </si-application-header>

  <si-navbar-vertical-next
    stateId="navbar-vertical-next-badges"
    toggleButtonText="Toggle"
    [alwaysFlyout]="alwaysFlyout"
    [inlineCollapse]="inlineCollapse"
  >
    <si-navbar-vertical-next-search placeholder="Search..." />
    <si-navbar-vertical-next-items>
      <a
        si-navbar-vertical-next-item
        routerLink="home"
        routerLinkActive
        icon="element-home"
        badge="Text"
        label="Home"
        [hideBadgeWhenCollapsed]="true"
      ></a>
      <si-navbar-vertical-next-header>Badge Examples</si-navbar-vertical-next-header>
      <a
        si-navbar-vertical-next-item
        routerLink="text-badge"
        routerLinkActive
        icon="element-info"
        badge="Info"
        badgeColor="info-emphasis"
        label="Text badge"
      ></a>
      <button
        type="button"
        si-navbar-vertical-next-item
        icon="element-user-group"
        badgeColor="critical-emphasis"
        stateId="group-with-badges"
        label="Group with badges"
        [badge]="6"
        [siNavbarVerticalNextGroupTriggerFor]="groupWithBadges"
      ></button>
      <button
        type="button"
        si-navbar-vertical-next-item
        icon="element-special-object"
        label="Group item"
        [siNavbarVerticalNextGroupTriggerFor]="groupItem"
      ></button>
      <si-navbar-vertical-next-divider />
      <a
        si-navbar-vertical-next-item
        routerLink="success"
        routerLinkActive
        icon="element-checked"
        badgeColor="success"
        label="Subtle badge"
        [badge]="5"
      ></a>
      <a
        si-navbar-vertical-next-item
        routerLink="danger"
        routerLinkActive
        icon="element-warning"
        badgeColor="danger-emphasis"
        label="Danger emphasis badge"
        [badge]="100"
      ></a>
    </si-navbar-vertical-next-items>
    <si-navbar-vertical-next-footer-items>
      <a
        si-navbar-vertical-next-item
        routerLink="configuration"
        routerLinkActive
        icon="element-parameter"
        label="Configuration"
      ></a>
    </si-navbar-vertical-next-footer-items>

    <div class="si-layout-main-padding">
      <div class="si-layout-header">
        <h2 class="si-layout-title si-layout-top-element">Badge Examples</h2>
      </div>
      <router-outlet />
      <div class="card p-5 mt-8 e2e-ignore">
        <div class="card-header">Control panel</div>
        <div class="card-body">
          <div class="row">
            <div class="col-sm-auto">
              <si-form-item label="Always flyout">
                <input type="checkbox" class="form-check-input" [(ngModel)]="alwaysFlyout" />
              </si-form-item>
            </div>
            <div class="col-sm-auto">
              <si-form-item label="Inline collapse">
                <input type="checkbox" class="form-check-input" [(ngModel)]="inlineCollapse" />
              </si-form-item>
            </div>
          </div>
        </div>
      </div>
    </div>
  </si-navbar-vertical-next>
</div>

<ng-template #groupWithBadges>
  <si-navbar-vertical-next-group routerLinkActive>
    <a
      si-navbar-vertical-next-item
      routerLink="sub-badge-1"
      routerLinkActive
      badgeColor="critical-emphasis"
      label="Sub item critical"
      [badge]="1"
    ></a>
    <a
      si-navbar-vertical-next-item
      routerLink="sub-badge-2"
      routerLinkActive
      badgeColor="info"
      label="Sub item info"
      [badge]="2"
    ></a>
    <a
      si-navbar-vertical-next-item
      routerLink="sub-badge-3"
      routerLinkActive
      badgeColor="warning"
      label="Sub item warning"
      [badge]="3"
    ></a>
  </si-navbar-vertical-next-group>
</ng-template>

<ng-template #groupItem>
  <si-navbar-vertical-next-group routerLinkActive>
    <a si-navbar-vertical-next-item routerLink="sub-badge-4" routerLinkActive label="Sub item"></a>
    <a si-navbar-vertical-next-item routerLink="sub-badge-5" routerLinkActive label="Sub item"></a>
    <a si-navbar-vertical-next-item routerLink="sub-badge-6" routerLinkActive label="Sub item"></a>
  </si-navbar-vertical-next-group>
</ng-template>
