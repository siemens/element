<div class="p-5">
  <section class="d-flex align-items-center gap-4 mb-5">
    <div class="btn-group" role="group" aria-label="File operations">
      <button
        type="button"
        class="btn btn-icon btn-primary"
        siTooltip="Open file"
        aria-label="Open file"
      >
        <i class="icon element-folder-open"></i>
      </button>
      <button type="button" class="btn btn-icon btn-primary" siTooltip="Save" aria-label="Save">
        <i class="icon element-save"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-primary"
        siTooltip="Download"
        aria-label="Download"
      >
        <i class="icon element-download"></i>
      </button>
      <button type="button" class="btn btn-icon btn-primary" siTooltip="Share" aria-label="Share">
        <i class="icon element-share"></i>
      </button>
    </div>
    <div class="btn-group" role="group" aria-label="Basic actions">
      <button type="button" class="btn btn-icon btn-secondary" siTooltip="Edit" aria-label="Edit">
        <i class="icon element-edit"></i>
      </button>
      <button type="button" class="btn btn-icon btn-secondary" siTooltip="Copy" aria-label="Copy">
        <i class="icon element-copy"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="Delete"
        aria-label="Delete"
      >
        <i class="icon element-delete"></i>
      </button>
    </div>
    <div class="btn-group" role="group" aria-label="Template examples">
      <button
        #focusButton
        type="button"
        class="btn btn-icon btn-tertiary"
        aria-label="Template HTML example"
        [siTooltip]="tooltipTemplateHtml"
      >
        <i class="icon element-microwave-on"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-tertiary"
        aria-label="Template example"
        [siTooltip]="tooltipTemplate"
      >
        <i class="icon element-light-desk"></i>
      </button>
    </div>
  </section>

  <section class="mb-5">
    <h4>Tooltip Placement</h4>
    <div class="btn-group" role="group" aria-label="Tooltip placement">
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="Auto placement"
        placement="auto"
        aria-label="Auto placement"
      >
        <i class="icon element-language"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="Top"
        placement="top"
        aria-label="Top"
      >
        <i class="icon element-up-2"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="Bottom"
        placement="bottom"
        aria-label="Bottom"
      >
        <i class="icon element-down-2"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="Start"
        placement="start"
        aria-label="Start"
      >
        <i class="icon element-left-2"></i>
      </button>
      <button
        type="button"
        class="btn btn-icon btn-secondary"
        siTooltip="End"
        placement="end"
        aria-label="End"
      >
        <i class="icon element-right-2"></i>
      </button>
    </div>
  </section>

  <section class="mb-5">
    <h4>Other examples</h4>
    <div class="d-flex align-items-start gap-4" style="max-width: 300px">
      <button
        type="button"
        class="btn btn-secondary mt-4 d-inline text-truncate"
        siTooltip="A long time ago in a galaxy far, far away..."
      >
        A long time ago in a galaxy far, far away...
      </button>
      <si-tabset class="w-50">
        <si-tab heading="Heading" icon="element-portfolio" siTooltip="Portfolio">
          <p class="mt-4"> Portfolio </p>
        </si-tab>
        <si-tab
          heading="Heading"
          icon="element-portfolio-kpi"
          siTooltip="Sustainability portfolio KPI"
        >
          <p class="mt-4"> Performance </p>
        </si-tab>
        <si-tab
          heading="Heading"
          icon="element-sustainability"
          siTooltip="Sustainability portfolio"
        >
          <p class="mt-4"> Sustainability </p>
        </si-tab>
      </si-tabset>
    </div>
  </section>
</div>

<ng-template #tooltipTemplateHtml> Hello, <span [innerHtml]="html"></span> </ng-template>
<ng-template #tooltipTemplate>
  <div>
    <si-icon class="si-display" icon="element-light-desk-filled" />
  </div>
  <div>I'm the tooltip template</div>
</ng-template>
