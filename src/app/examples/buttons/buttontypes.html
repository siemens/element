<div class="h-100 d-flex flex-column align-items-center justify-content-center p-6 text-center">
  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-primary text-truncate ms-auto"> Primary button </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-primary text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Primary button
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-warning text-truncate ms-auto" [disabled]="disabled">
        Warning button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-warning text-truncate" [disabled]="disabled">
        <i class="icon element-manual"></i>
        Warning button
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-danger text-truncate ms-auto" [disabled]="disabled">
        Danger button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-danger text-truncate" [disabled]="disabled">
        <i class="icon element-delete"></i>
        Danger button
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-secondary text-truncate ms-auto" [disabled]="disabled">
        Secondary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-secondary text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Secondary button
      </button>
    </div>
  </div>
  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button
        type="button"
        class="btn btn-secondary-warning text-truncate ms-auto"
        [disabled]="disabled"
      >
        Secondary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-secondary-warning text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Secondary button
      </button>
    </div>
  </div>
  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button
        type="button"
        class="btn btn-secondary-danger text-truncate ms-auto"
        [disabled]="disabled"
      >
        Secondary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-secondary-danger text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Secondary button
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-input text-truncate ms-auto" [disabled]="disabled">
        Input button
      </button>
    </div>
    <div class="col-6">
      <button
        type="button"
        class="btn btn-input dropdown-toggle text-truncate"
        [disabled]="disabled"
      >
        <i class="icon element-calendar"></i>
        Input button
        <i class="dropdown-caret icon element-down-2"></i>
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button type="button" class="btn btn-tertiary text-truncate ms-auto" [disabled]="disabled">
        Tertiary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-tertiary text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Tertiary button
      </button>
    </div>
  </div>
  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button
        type="button"
        class="btn btn-tertiary-warning text-truncate ms-auto"
        [disabled]="disabled"
      >
        Tertiary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-tertiary-warning text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Tertiary button
      </button>
    </div>
  </div>
  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <button
        type="button"
        class="btn btn-tertiary-danger text-truncate ms-auto"
        [disabled]="disabled"
      >
        Tertiary button
      </button>
    </div>
    <div class="col-6">
      <button type="button" class="btn btn-tertiary-danger text-truncate" [disabled]="disabled">
        <i class="icon element-download"></i>
        Tertiary button
      </button>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <div class="btn-split ms-auto" role="group" aria-label="Split button">
        <button type="button" class="btn btn-primary text-truncate" [disabled]="disabled"
          >Split button</button
        >
        <button
          type="button"
          class="btn btn-primary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen1"
          (cdkMenuOpened)="splitOpen1 = true"
          (cdkMenuClosed)="splitOpen1 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="col-6">
      <div class="btn-split" role="group" aria-label="Split button with icon">
        <button type="button" class="btn btn-primary text-truncate" [disabled]="disabled">
          <i class="icon element-download" aria-hidden="true"></i>
          Split button
        </button>
        <button
          type="button"
          class="btn btn-primary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen2"
          (cdkMenuOpened)="splitOpen2 = true"
          (cdkMenuClosed)="splitOpen2 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row gx-6 gy-6 mb-6">
    <div class="col-6 d-flex">
      <div class="btn-split ms-auto" role="group" aria-label="Split button">
        <button type="button" class="btn btn-secondary text-truncate" [disabled]="disabled"
          >Split button</button
        >
        <button
          type="button"
          class="btn btn-secondary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen3"
          (cdkMenuOpened)="splitOpen3 = true"
          (cdkMenuClosed)="splitOpen3 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="col-6">
      <div class="btn-split" role="group" aria-label="Split button with icon">
        <button type="button" class="btn btn-secondary text-truncate" [disabled]="disabled">
          <i class="icon element-download" aria-hidden="true"></i>
          Split button
        </button>
        <button
          type="button"
          class="btn btn-secondary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen4"
          (cdkMenuOpened)="splitOpen4 = true"
          (cdkMenuClosed)="splitOpen4 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row gx-6 gy-6">
    <div class="col-6 d-flex">
      <div class="btn-split ms-auto" role="group" aria-label="Split button">
        <button type="button" class="btn btn-tertiary text-truncate" [disabled]="disabled"
          >Split button</button
        >
        <button
          type="button"
          class="btn btn-tertiary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen5"
          (cdkMenuOpened)="splitOpen5 = true"
          (cdkMenuClosed)="splitOpen5 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="col-6">
      <div class="btn-split" role="group" aria-label="Split button with icon">
        <button type="button" class="btn btn-tertiary text-truncate" [disabled]="disabled">
          <i class="icon element-download" aria-hidden="true"></i>
          Split button
        </button>
        <button
          type="button"
          class="btn btn-tertiary dropdown-toggle"
          aria-label="Dropdown toggle"
          [disabled]="disabled"
          [cdkMenuTriggerFor]="dropdownMenu"
          [class.show]="splitOpen6"
          (cdkMenuOpened)="splitOpen6 = true"
          (cdkMenuClosed)="splitOpen6 = false"
        >
          <i class="dropdown-caret icon element-down-2" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #dropdownMenu>
  <si-menu>
    @for (item of menuItems; track $index) {
      <si-menu-item [icon]="item.icon">{{ item.text }}</si-menu-item>
    }
  </si-menu>
</ng-template>
