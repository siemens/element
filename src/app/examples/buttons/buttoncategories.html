<div class="p-5">
  <div class="d-flex flex-wrap align-items-center gap-4 mb-6">
    <button type="button" class="btn btn-primary">Primary action</button>
    <button type="button" class="btn btn-secondary">Secondary action</button>
    <button type="button" class="btn btn-tertiary">Tertiary action</button>
  </div>
  <div class="d-flex flex-wrap align-items-center gap-4 mb-6">
    <button
      type="button"
      class="btn btn-icon btn-sm btn-primary element-left-4 flip-rtl"
      aria-label="left"
    ></button>
    <button
      type="button"
      class="btn btn-icon btn-sm btn-secondary element-right-4 flip-rtl"
      aria-label="right"
    ></button>
    <button
      type="button"
      class="btn btn-icon btn-tertiary element-share"
      aria-label="share"
    ></button>
    <button
      type="button"
      class="btn btn-circle btn-sm btn-primary element-minus"
      aria-label="minus"
    ></button>
    <button
      type="button"
      class="btn btn-circle btn-sm btn-secondary element-plus"
      aria-label="plus"
    ></button>
    <button
      type="button"
      class="btn btn-circle btn-tertiary element-options-vertical"
      aria-label="more options"
    ></button>
    <button type="button" class="btn btn-icon btn-ghost" aria-label="Copy">
      <i class="icon element-copy"></i>
    </button>
    <button type="button" class="btn btn-circle btn-ghost" aria-label="Clock">
      <i class="icon element-clock"></i>
    </button>
  </div>
</div>
