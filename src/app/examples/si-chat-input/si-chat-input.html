<div class="p-2">
  <si-chat-input
    placeholder="Ask anything or attach files (max 280 characters)..."
    disclaimer="AI responses are generated for demonstration purposes. Please verify important information."
    accept="image/*,.pdf,.doc,.docx,.txt,.xlsx,.csv"
    sendButtonLabel="Send Message"
    sendButtonIcon="element-send"
    attachFileLabel="Attach files"
    [allowAttachments]="true"
    [maxFileSize]="5242880"
    [maxLength]="280"
    [autoFocus]="false"
    [value]="inputValue()"
    [sending]="sending()"
    [disabled]="disabled()"
    [attachments]="preAttachedFiles"
    [actions]="actions"
    [secondaryActions]="secondaryActions"
    (send)="onMessageSent($event)"
    (fileError)="onFileError($event)"
  />
</div>
