<div class="p-4">
  <!-- Incoming message with bubble, attachment, markdown content and actions -->
  <si-chat-message
    flow="incoming"
    actionPlacement="bottom"
    actionParam="message-1"
    content="Can you help me with this **code snippet**? I'm getting an error when I run it."
    [markdown]="true"
    [attachments]="attachments"
    [actions]="actions"
    [secondaryActions]="secondaryActions"
  >
    <si-icon class="icon" [icon]="icons.elementUser" />
  </si-chat-message>

  <div class="mt-5">
    <!-- End-aligned message (e.g. a peer's reply) using alignment override, with side actions -->
    <si-chat-message
      flow="incoming"
      alignment="end"
      actionPlacement="side"
      actionParam="message-2"
      content="Thanks for the help! That worked perfectly."
      [actions]="actions"
    >
      <si-avatar size="small" initials="JD" altText="User" />
    </si-chat-message>
  </div>

  <div class="mt-5">
    <!-- Loading state, incoming -->
    <si-chat-message flow="incoming" [loading]="true">
      <si-icon class="icon" [icon]="icons.elementUser" />
    </si-chat-message>
  </div>

  <div class="mt-5">
    <!-- Loading state, end-aligned with attachments -->
    <si-chat-message flow="incoming" alignment="end" [loading]="true" [attachments]="attachments">
      <si-icon class="icon" [icon]="icons.elementUser" />
    </si-chat-message>
  </div>
</div>
