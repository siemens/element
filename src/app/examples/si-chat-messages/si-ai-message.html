<div class="p-2">
  <si-ai-message
    actionParam="message-1"
    [content]="content"
    [contentFormatter]="markdownRenderer"
    [actions]="actions"
    [secondaryActions]="secondaryActions"
    [loading]="false"
  />

  <si-ai-message
    actionParam="message-2"
    [annotatedText]="annotatedText"
    [actions]="actions"
    [secondaryActions]="secondaryActions"
    (citationClicked)="onCitationClicked($event)"
  />

  <div class="mt-5">
    <si-ai-message [loading]="true" />
  </div>
</div>
