<div class="p-5 clearfix">
  <h3>Datatable with translatable header names</h3>
  <ngx-datatable
    #table
    class="material table-element table-custom"
    columnMode="force"
    siDatatableInteraction
    [columns]="columns"
    [footerHeight]="0"
    [rowHeight]="tableConfig.rowHeightSmall"
    [rows]="rows"
    [offset]="pageNumber"
    [count]="rows.length"
  />
</div>
