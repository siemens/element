<div class="py-2" [style.width.px]="width()" [style.height.px]="height()">
  <div class="position-relative h-100">
    @for (value of series().values; track $index) {
      <div
        class="position-absolute"
        [style.height.%]="getBarHeight(value)"
        [style.top.%]="getBarTop(value)"
        [style.left.px]="$index * (barWidth + 1)"
        [style.width.px]="barWidth"
        [style.backgroundColor]="'var(--' + series().colorToken + ')'"
      ></div>
    }
  </div>
</div>
