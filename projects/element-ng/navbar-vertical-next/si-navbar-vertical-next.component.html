@if (visible()) {
  @if (smallScreen() && !collapsed()) {
    <div class="modal-backdrop" animate.leave="backdrop-leave" (click)="toggleCollapse()"></div>
  }
  <nav
    tabindex="-1"
    class="bg-base-1 focus-sub-inside"
    [class.expanded]="!collapsed()"
    [siSkipLinkTarget]="skipLinkNavigationLabel()"
    [class.text-only]="textOnly()"
  >
    <div class="collapse-toggle ms-auto">
      <div class="mobile-drawer focus-inside navbar-vertical-no-collapse">
        <button
          type="button"
          class="btn btn-icon btn-tertiary-ghost"
          [attr.aria-label]="
            (collapsed() ? navbarExpandButtonText() : navbarCollapseButtonText()) | translate
          "
          [attr.aria-expanded]="!collapsed()"
          (click)="toggleCollapse()"
        >
          <si-icon
            class="flip-rtl"
            [icon]="collapsed() ? icons.elementDoubleRight : icons.elementDoubleLeft"
          />
        </button>
      </div>
    </div>
    @if (searchable()) {
      <div class="nav-search">
        <si-search-bar
          class="mx-4"
          colorVariant="base-0"
          prohibitedCharacters="*?"
          [placeholder]="searchPlaceholder() | translate"
          [debounceTime]="searchDebounceTime()"
          [showIcon]="true"
          (searchChange)="doSearch($event)"
        />
        <button
          type="button"
          class="btn-search bg-base-0 p-3 mx-4 mobile navbar-vertical-no-collapse text-secondary"
          [attr.aria-label]="searchPlaceholder() | translate"
          (click)="expandForSearch()"
        >
          <si-icon class="icon" [icon]="icons.elementSearch" />
        </button>
      </div>
    }
    <ng-content select="si-navbar-vertical-items-next" />
  </nav>
}
<main
  class="si-layout-inner focus-none"
  tabindex="-1"
  [siSkipLinkTarget]="skipLinkMainContentLabel()"
>
  <ng-content />
</main>
