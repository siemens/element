<si-number-input
  class="form-control mb-4"
  [aria-label]="valueLabel()"
  [value]="offset()"
  (valueChange)="updateValue($event ?? 0)"
/>
<si-select
  class="form-control"
  min="0"
  [ariaLabel]="unitLabel()"
  [options]="offsetList()"
  [value]="unit()"
  (valueChange)="changeUnit($event)"
/>
