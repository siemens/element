<span class="form-label-container">
  <span class="form-label" [class.required]="isRequired()" [id]="labelId">{{
    label() | translate
  }}</span>
  <ng-content select="[si-help-button]" />
</span>
<div>
  <ng-content />
  @if (hasOnlyRadios()) {
    <div class="invalid-feedback" [class.d-block]="touched()">
      @for (error of errors(); track error) {
        <div>
          {{ error.message | translate: error.params }}
        </div>
      }
    </div>
  }
</div>
