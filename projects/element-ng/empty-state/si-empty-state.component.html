@let iconValue = icon();
<div class="list-group-item-empty" [class.auto-responsive]="responsiveBehaviour() === 'auto'">
  @if (iconValue) {
    <si-icon class="state-icon" [icon]="iconValue" />
  }
  <h2 class="mb-0 text-center">{{ heading() | translate }}</h2>
  @if (content()) {
    <p class="state-content text-pre-wrap text-center text-secondary mt-6 mb-0">{{
      content() | translate
    }}</p>
  }
  <span class="mt-8">
    <ng-content />
  </span>
</div>
