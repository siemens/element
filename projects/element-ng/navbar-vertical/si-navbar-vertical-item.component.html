@let icon = item().icon;
<div class="item-content d-flex align-items-center">
  @if (icon) {
    <si-icon class="icon me-n2" [icon]="icon" />
  }
  <div class="item-title text-truncate si-h5">
    <ng-content />
  </div>
</div>
@if (!navbar.textOnly() && formattedBadge()) {
  <span
    class="badge"
    [ngClass]="'bg-' + (item().badgeColor ?? 'default')"
    [class.badge-text-only]="this.textOnlyBadge()"
    [class.badge-collapsed]="this.navbar.collapsed()"
    >{{ formattedBadge() }}</span
  >
}
@if (group) {
  <si-icon aria-hidden="true" class="dropdown-caret me-0 text-body" [icon]="icons.elementDown2" />
}
