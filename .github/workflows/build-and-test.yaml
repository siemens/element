name: Build and Test
on:
  workflow_call:
    secrets:
      SIEMENS_NPM_TOKEN:
        required: true
      SIEMENS_NPM_USER:
        required: true
      MAPTILER_KEY:
        required: true
  pull_request:
  merge_group:

permissions: read-all

# Stops the workflow run if the PR is updated
# https://stackoverflow.com/a/72408109
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}
  MAPTILER_URL: https://api.maptiler.com/maps/voyager/style.json?key=${{ secrets.MAPTILER_KEY }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # We need this for commit-lint
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - run: npm config set //code.siemens.com/api/v4/packages/npm/:_authToken $SIEMENS_NPM_TOKEN
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: npm ci --prefer-offline --no-audit --include=optional
      - run: npm run lint:commit
      - run: npm run build:all
      - run: npm run prepare-brand
      - run: npm run build:all:update-translatable-keys # Output is needed in dist for providing default translations
      - run: git diff --exit-code "projects/**/*-translatable-keys.interface.ts"
      - run: npm run build:examples -- --define="maptilerKey='$MAPTILER_KEY'" --define="maptilerUrl='$MAPTILER_URL'"
      - run: npm run dashboards-demo:build-all -- --progress=false
      - run: npm run dashboards-demo:build-all:esm

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist
          path: dist

  test:
    runs-on: ubuntu-24.04
    # We use playwright browser to run tests
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      # See: https://github.com/microsoft/playwright/issues/27620
      HOME: /root
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - run: npm ci --prefer-offline --no-audit
      - run: npm run translate:test -- --watch=false --progress=false --coverage
      - run: npm run lib:test -- --watch=false --progress=false --coverage
      - run: npm run schematics:test
      - run: npm run charts:test -- --watch=false --progress=false --coverage
      - run: npm run dashboards:test -- --watch=false --progress=false --coverage
      - run: npm run maps:test -- --watch=false --progress=false --coverage
      - run: npm run native-charts:test -- --watch=false --progress=false --coverage
      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: 'coverage/*/cobertura-coverage.xml'
          badge: true
          format: markdown
          output: both
          hide_branch_rate: true
          hide_complexity: true
          indicators: false
          file_coverage_mode: changes
      - name: Generate coverage summary JSON
        run: |
          # Extract coverage percentage from markdown and create JSON badge
          TOTAL_COVERAGE=$(grep -E "(Summary|Total)" code-coverage-results.md | grep -oE '[0-9]+(\.[0-9]+)?%' | head -1 | sed 's/%//')
          echo "Extracted coverage: $TOTAL_COVERAGE%"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$TOTAL_COVERAGE%\", \"color\": \"brightgreen\"}" > coverage/coverage-summary.json
      - name: Extract coverage badge
        run: |
          # Extract only the badge line and total coverage line
          head -n 2 code-coverage-results.md > coverage/coverage-badge.md
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-reports
          path: coverage
          retention-days: 30

  verification:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - run: npm config set //code.siemens.com/api/v4/packages/npm/:_authToken $SIEMENS_NPM_TOKEN
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: npm ci --prefer-offline --no-audit --include=optional
      - run: npm run lint:format
      - run: npm run lint:scss
      - run: npm run lint:ng
      - run: npm run lint:playwright:eslint
      - run: npm run api-goldens:test

  e2e:
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      # As we are in another container, we need to install LFS manually.
      # See: https://github.com/orgs/community/discussions/160433
      - name: Install LFS
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
          apt install git-lfs
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      # Not injecting the token will exclude the brand packages, but this is fine for e2e tests.
      - run: npm ci --prefer-offline --no-audit --include=optional
      - run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  e2e-merge-reports:
    if: ${{ !cancelled() }}
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - run: npx playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 2

  documentation:
    if: ${{ github.event_name != 'merge_group' }}
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/krypton
          cache: 'npm'
      - run: npm config set //code.siemens.com/api/v4/packages/npm/:_authToken $SIEMENS_NPM_TOKEN
      - run: npm config set //code.siemens.com/api/v4/projects/516167/packages/npm/:_authToken $SIEMENS_NPM_TOKEN
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: npm ci --prefer-offline --no-audit --include=optional
      - run: cp dist/element-examples/favicon.png docs/_src/favicon.png
      - run: uv sync
        env:
          UV_INDEX_CODE_DOCS_THEME_USERNAME: ${{ secrets.SIEMENS_NPM_USER }}
          UV_INDEX_CODE_DOCS_THEME_PASSWORD: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: npm run icon-viewer:build-docs
      - run: npm run docs:build:generate
        env:
          EXAMPLES_BASE: /element-examples/
        if: ${{ github.ref == 'refs/heads/main' }}
      - run: npm run docs:build:api
        env:
          EXAMPLES_BASE: /element-examples/
        if: ${{ github.ref != 'refs/heads/main' }}
      - run: mv dist/element-examples/ dist/design/
      - run: mv dist/dashboards-demo/ dist/design/
      - run: mv dist/dashboards-demo-esm/ dist/design/
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pages
          path: dist/design

  preview:
    if: ${{ !cancelled() && github.event_name == 'pull_request' }} # This must be skipped for releases, documentation builds, and merge queue runs
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      BUCKET_NAME: simpl-element-preview
    needs:
      - e2e-merge-reports
      - documentation
      - test
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pages
          path: pages
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: coverage-reports
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::974483672234:role/simpl-element-preview
          role-session-name: element-preview
          aws-region: eu-west-1
      - run: |
          aws s3 cp --quiet --no-progress --recursive ./pages s3://${{ env.BUCKET_NAME }}/pr-${{ github.event.pull_request.number }}/pages
          aws s3 cp --quiet --no-progress --recursive ./playwright-report s3://${{ env.BUCKET_NAME }}/pr-${{ github.event.pull_request.number }}/playwright-report
          aws s3 cp --quiet --no-progress --recursive ./coverage-reports s3://${{ env.BUCKET_NAME }}/pr-${{ github.event.pull_request.number }}/pages/coverage
      - name: Build PR description block
        run: |
          cat > pr-preview-description.md <<'EOF'
          <!-- preview-links:start -->

          ---

          [Documentation](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/).
          [Examples](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/element-examples/).
          [Dashboards Demo](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/dashboards-demo/).
          [Playwright report](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/playwright-report/).

          **Coverage Reports:**

          EOF
          cat coverage-reports/coverage-badge.md >> pr-preview-description.md
          cat >> pr-preview-description.md <<'EOF'
          - [charts-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/charts-ng/)
          - [dashboards-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/dashboards-ng/)
          - [element-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/element-ng/)
          - [element-translate-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/element-translate-ng/)
          - [maps-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/maps-ng/)
          - [native-charts-ng](https://d33c9dcnqinn2a.cloudfront.net/pr-${{ github.event.pull_request.number }}/pages/coverage/native-charts-ng/)

          <!-- preview-links:end -->
          EOF
      - name: Update PR description block
        uses: nefrob/pr-description@4dcc9f3ad5ec06b2a197c5f8f93db5e69d2fdca7 # v1.2.0
        with:
          token: ${{ github.token }}
          content: pr-preview-description.md
          contentIsFilePath: true
          regex: '<!-- preview-links:start -->.*?<!-- preview-links:end -->'
          regexFlags: 'ims'
