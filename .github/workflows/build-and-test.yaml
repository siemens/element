name: Build and Test
on:
  workflow_call:
    secrets:
      SIEMENS_NPM_TOKEN:
        required: true
      SIEMENS_NPM_USER:
        required: true
      MAPTILER_KEY:
        required: true

permissions: read-all

env:
  MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}
  MAPTILER_URL: https://api.maptiler.com/maps/voyager/style.json?key=${{ secrets.MAPTILER_KEY }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # We need this for commit-lint
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - run: |
          rm .npmrc
          echo '[install.scopes]' >> bunfig.toml
          echo '"@simpl" = { token = "$SIEMENS_NPM_TOKEN", url = "https://code.siemens.com/api/v4/packages/npm/" }' >> bunfig.toml
      - run: bun install --prefer-offline --no-audit --include=optional
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - uses: actions/cache/save@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun
      - run: bun run --bun lint:commit
      - run: bun run --bun build:all:bun
      - run: bun run --bun prepare-brand
      - run: bun run --bun build:all:update-translatable-keys:bun # Output is needed in dist for providing default translations
      - run: git diff --exit-code "projects/**/*-translatable-keys.interface.ts"
      - run: bun run --bun build:examples -- --define="maptilerKey='$MAPTILER_KEY'" --define="maptilerUrl='$MAPTILER_URL'"
      - run: bun run --bun dashboards-demo:build-all -- --progress=false
      - run: bun run --bun dashboards-demo:build-all:esm

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist

  test:
    runs-on: ubuntu-24.04
    # We use playwright browser to run tests
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      # See: https://github.com/microsoft/playwright/issues/27620
      HOME: /root
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Bun
        run: |
          npm install -global bun@1.3.13
      - run: |
          rm .npmrc
          echo '[install.scopes]' >> bunfig.toml
          echo '"@simpl" = { token = "$SIEMENS_NPM_TOKEN", url = "https://code.siemens.com/api/v4/packages/npm/" }' >> bunfig.toml
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun
      - run: bun install --prefer-offline --no-audit --include=optional
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: bun run --bun lint:format
      - run: bun run --bun lint:scss
      - run: bun run --bun lint:ng
      - run: bun run --bun lint:playwright:eslint
      - run: PW_DISABLE_TS_ESM=1 bun run --bun translate:test -- --watch=false --progress=false --coverage
      - run: PW_DISABLE_TS_ESM=1 bun run --bun lib:test -- --watch=false --progress=false --coverage
      - run: bun run --bun schematics:test:bun
      - run: PW_DISABLE_TS_ESM=1 bun run --bun charts:test -- --watch=false --progress=false --coverage
      - run: PW_DISABLE_TS_ESM=1 bun run --bun dashboards:test -- --watch=false --progress=false --coverage
      - run: PW_DISABLE_TS_ESM=1 bun run --bun maps:test -- --watch=false --progress=false --coverage
      - run: PW_DISABLE_TS_ESM=1 bun run --bun native-charts:test -- --watch=false --progress=false --coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: dist/coverage
          retention-days: 30

  coverage:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: dist/coverage
      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: 'coverage/*/cobertura-coverage.xml'
          badge: true
          format: markdown
          output: both
          hide_branch_rate: true
          hide_complexity: true
          indicators: false
          file_coverage_mode: changes
      - name: Generate coverage summary JSON
        run: |
          # Extract coverage percentage from markdown and create JSON badge
          TOTAL_COVERAGE=$(grep -E "(Summary|Total)" code-coverage-results.md | grep -oE '[0-9]+(\.[0-9]+)?%' | head -1 | sed 's/%//')
          echo "Extracted coverage: $TOTAL_COVERAGE%"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$TOTAL_COVERAGE%\", \"color\": \"brightgreen\"}" > coverage/coverage-summary.json
      - name: Extract coverage badge
        run: |
          # Extract only the badge line and total coverage line
          head -n 2 code-coverage-results.md > coverage/coverage-badge.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: coverage
          retention-days: 30

  verification:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - run: |
          rm .npmrc
          echo '[install.scopes]' >> bunfig.toml
          echo '"@simpl" = { token = "$SIEMENS_NPM_TOKEN", url = "https://code.siemens.com/api/v4/packages/npm/" }' >> bunfig.toml
      - uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun
      - run: bun install --prefer-offline --no-audit --include=optional
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: bun run --bun prepare-brand
      - run: bun run --bun build:examples:aot -- --define="maptilerKey='$MAPTILER_KEY'" --define="maptilerUrl='$MAPTILER_URL'"
      - run: bun run --bun api-goldens:test:bun

  e2e:
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      # As we are in another container, we need to install LFS manually.
      # See: https://github.com/orgs/community/discussions/160433
      - name: Install LFS
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
          apt install git-lfs
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
      - name: Install Bun
        run: |
          npm install -global bun@1.3.13
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - run: |
          rm .npmrc
          echo '[install.scopes]' >> bunfig.toml
          echo '"@simpl" = { token = "$SIEMENS_NPM_TOKEN", url = "https://code.siemens.com/api/v4/packages/npm/" }' >> bunfig.toml
      - uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun
      - run: bun install --prefer-offline --no-audit --include=optional
      - run: PLAYWRIGHT_isBun=true PW_DISABLE_TS_ESM=1 bunx --bun playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  e2e-merge-reports:
    if: ${{ !cancelled() }}
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - run: PLAYWRIGHT_isBun=true PW_DISABLE_TS_ESM=1 bunx --bun playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 2

  documentation:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-summary
          path: .
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: dist/coverage
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.13'
      - run: |
          rm .npmrc
          echo '[install.scopes]' >> bunfig.toml
          echo '"@simpl" = { token = "$SIEMENS_NPM_TOKEN", url = "https://code.siemens.com/api/v4/packages/npm/" }' >> bunfig.toml
      - uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun
      - run: bun install --prefer-offline --no-audit --include=optional
        env:
          SIEMENS_NPM_TOKEN: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: cp dist/element-examples/favicon.png docs/_src/favicon.png
      - run: uv sync
        env:
          UV_INDEX_CODE_DOCS_THEME_USERNAME: ${{ secrets.SIEMENS_NPM_USER }}
          UV_INDEX_CODE_DOCS_THEME_PASSWORD: ${{ secrets.SIEMENS_NPM_TOKEN }}
      - run: bun run --bun icon-viewer:build-docs
      - run: bun run --bun docs:build:generate
        env:
          EXAMPLES_BASE: /element-examples/
        if: ${{ github.ref == 'refs/heads/main' }}
      - run: bun run --bun docs:build:api
        env:
          EXAMPLES_BASE: /element-examples/
        if: ${{ github.ref != 'refs/heads/main' }}
      - run: mv dist/element-examples/ dist/design/
      - run: mv dist/dashboards-demo/ dist/design/
      - run: mv dist/dashboards-demo-esm/ dist/design/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pages
          path: dist/design
