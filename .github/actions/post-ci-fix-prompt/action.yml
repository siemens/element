name: Post CI Fix Prompt
description: Collects failure logs for a completed job and posts an AI fix prompt as a sticky PR comment

inputs:
  job-title:
    description: Display name for the failed job in the comment header
    required: true
  comment-header:
    description: Unique identifier for the sticky comment (used for dedup/update)
    required: true
  target-job-name:
    description: Substring to match the target job name in the GitHub API (e.g. "verification", "e2e (1, 3)")
    required: true

runs:
  using: composite
  steps:
    - name: Build AI fix prompt
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      env:
        JOB_TITLE: ${{ inputs.job-title }}
        TARGET_JOB_NAME: ${{ inputs.target-job-name }}
      with:
        script: |
          const fs = require('fs');
          const { owner, repo } = context.repo;
          const jobTitle = process.env.JOB_TITLE;
          const targetJobName = process.env.TARGET_JOB_NAME;
          const isPlaywright = jobTitle === 'E2E Tests';
          const isUnitTest = jobTitle === 'Unit Tests';

          const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
            owner, repo,
            run_id: context.runId,
            filter: 'latest',
            per_page: 100
          });

          // Find all failed jobs matching the target name (match against last segment to avoid
          // false positives from the workflow name prefix in reusable workflow calls)
          const failedJobs = jobs.filter(j => {
            if (j.conclusion !== 'failure') return false;
            const segments = j.name.split(' / ');
            const jobName = segments[segments.length - 1];
            return jobName.includes(targetJobName);
          });

          if (!failedJobs.length) {
            core.warning(`Could not find failed job matching "${targetJobName}"`);
            return;
          }

          const MAX_LOG_LINES = 80;
          let prompt = `The CI pipeline failed in the "${jobTitle}" job. Fix the following issues:\n\n`;

          for (const targetJob of failedJobs) {
            const failedSteps = (targetJob.steps || [])
              .filter(s => s.conclusion === 'failure')
              .map(s => s.name);

            let logs = '';

            try {
              const resp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: targetJob.id
              });
              const raw = typeof resp.data === 'string'
                ? resp.data
                : Buffer.isBuffer(resp.data)
                  ? resp.data.toString('utf-8')
                  : String(resp.data);

              const lines = raw
                .split('\n')
                .map(l => l.replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z\s?/, ''))
                .map(l => l.replace(/\x1b\[[0-9;]*m/g, ''));

              // Split log into step sections using ##[group] markers
              const sections = [];
              let current = { header: '', lines: [] };
              let inGroup = false;

              for (const line of lines) {
                if (line.startsWith('##[group]')) {
                  if (current.header || current.lines.length) {
                    sections.push(current);
                  }
                  current = { header: line.replace('##[group]', '').trim(), lines: [] };
                  inGroup = true;
                } else if (line === '##[endgroup]') {
                  inGroup = false;
                } else if (/^Post job cleanup\b/.test(line)) {
                  // End current section; everything after this is cleanup noise
                  if (current.header || current.lines.length) {
                    sections.push(current);
                  }
                  current = { header: '', lines: [] };
                  inGroup = false;
                  break;
                } else if (!inGroup) {
                  current.lines.push(line);
                }
              }
              if (current.header || current.lines.length) {
                sections.push(current);
              }

              // Keep only sections that contain ##[error] (i.e. the failed steps)
              const errorSections = sections.filter(s =>
                s.lines.some(l => l.startsWith('##[error]'))
              );

              if (errorSections.length) {
                logs = errorSections.map(s => {
                  const allLines = s.lines
                    .map(l => l.replace(/^##\[error\]/, 'ERROR: '));

                  let output;

                  if (isPlaywright) {
                    const relevant = [];
                    let inSummary = false;

                    for (const line of allLines) {
                      // Start of the summary section (e.g. "  37 failed")
                      if (/^\s+\d+ failed/.test(line)) {
                        inSummary = true;
                      }

                      if (inSummary) {
                        relevant.push(line);
                        continue;
                      }

                      // Individual failure details (diffs, error context, expected/received)
                      if (
                        /^\s*(Error Context|Diff|Expected|Received|Snapshot|Call log|attachment):?/.test(line) ||
                        /^ERROR:/.test(line) ||
                        /^\s+\d+\s+\|/.test(line) || // code frame lines
                        /^\s+at\s/.test(line) // stack trace lines
                      ) {
                        relevant.push(line);
                      }
                    }

                    output = relevant.join('\n').trim();
                  } else if (isUnitTest) {
                    const relevant = [];
                    let inFailureBlock = false;

                    for (const line of allLines) {
                      // Start of failure details (e.g. "⎯⎯⎯ Failed Tests 1 ⎯⎯⎯")
                      if (/Failed Tests/.test(line)) {
                        inFailureBlock = true;
                      }

                      // Final summary lines (Test Files, Tests, Start at, Duration)
                      if (/^\s*(Test Files|Tests)\s+\d+/.test(line)) {
                        inFailureBlock = true;
                      }

                      if (inFailureBlock || /^ERROR:/.test(line)) {
                        relevant.push(line);
                      }
                    }

                    output = relevant.join('\n').trim();
                  } else {
                    output = allLines.join('\n').trim();
                  }

                  return s.header ? `Step: ${s.header}\n${output}` : output;
                }).join('\n\n');
              } else {
                // Fallback: strip post-job cleanup noise and take the tail
                const cleanupIdx = lines.findIndex(l => /^Post job cleanup\b/.test(l));
                logs = (cleanupIdx > -1 ? lines.slice(0, cleanupIdx) : lines)
                  .slice(-MAX_LOG_LINES)
                  .join('\n')
                  .trim();
              }
            } catch (e) {
              logs = `Could not retrieve logs: ${e.message}`;
            }

            if (logs.length > 8000) {
              logs = '... (truncated)\n' + logs.slice(-8000);
            }

            prompt += `FAILED: ${targetJob.name}\n`;
            if (failedSteps.length) {
              prompt += `Steps: ${failedSteps.join(', ')}\n`;
            }
            prompt += `\nError output:\n---\n${logs}\n---\n\n`;
          }

          prompt += 'Analyze the failure, find the root cause in the codebase, and provide the exact code changes needed to fix it.';

          if (prompt.length > 50000) {
            prompt = prompt.slice(0, 50000) + '\n... (truncated)';
          }

          const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
          const body = [
            `<details>`,
            `<summary><b>🔧 CI Fix Prompt — ${jobTitle}</b></summary>`,
            '',
            '```',
            prompt,
            '```',
            '',
            '</details>'
          ].join('\n');

          fs.writeFileSync('ci-fix-prompt.md', body);

    - name: Post CI fix prompt comment
      uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
      with:
        header: ${{ inputs.comment-header }}
        path: ci-fix-prompt.md
